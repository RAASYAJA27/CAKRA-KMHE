<!DOCTYPE html>
<html>
<head>
  <title>CAKRA KMHE Telemetry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CAKRA KMHE TELEMETRY</h1>

<div class="card">
  <h2>Speed</h2>
  <div id="speed">0 km/h</div>
</div>

<div class="card">
  <h2>TPS</h2>
  <div id="tps">0 %</div>
</div>

<div class="card">
  <h2>Lap</h2>
  <div id="lap">0</div>
</div>

<div class="card">
  <h2>Lap Time</h2>
  <div id="lapTime">0</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
