<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>KMHE Telemetry</title>
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#222;
padding:20px;
margin:15px;
border-radius:15px;
}

.value{
font-size:48px;
font-weight:bold;
}

#map{
    width:100%;
    height:400px;
    border-radius:15px;
}
</style>

</head>

<body>

<h1>CAKRA JAGAD TELEMETRY</h1>

<div class="card">
<h3>Speed</h3>
<div id="speed" class="value">0</div>
km/h
</div>

<div class="card">
<h3>TPS</h3>
<div id="tps" class="value">0</div>
%
</div>

<div class="card">
<h3>Lap</h3>
<div id="lap" class="value">0</div>
</div>

<div class="card">
<h3>Lap Time</h3>
<div id="lapTime" class="value">0</div>
</div>

<div class="card">
<h3>GPS Track</h3>
<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
