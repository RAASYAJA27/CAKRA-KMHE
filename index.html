<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAKRA JAGAD TELEMETRY</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="container">

<header>
    <h1>CAKRA JAGAD TELEMETRY</h1>
    <p>Realtime Vehicle Monitoring</p>
</header>

<section class="stats">

    <div class="card">
        <h3>SPEED</h3>
        <div id="speed" class="value">0</div>
        <span>km/h</span>
    </div>

    <div class="card">
        <h3>TPS</h3>
        <div id="tps" class="value">0</div>
        <span>%</span>
    </div>

    <div class="card">
        <h3>LAP</h3>
        <div id="lap" class="value">0</div>
    </div>

</section>

<section class="secondary">

    <div class="card">
        <h3>LAP TIME</h3>
        <div id="lapTime" class="value">0</div>
    </div>

    <div class="card">
        <h3>BATTERY</h3>
        <div id="battery" class="value">100</div>
        <span>%</span>
    </div>

</section>

<section class="card map-card">

    <h3>LIVE GPS TRACK</h3>

    <div id="map"></div>

</section>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module" src="app.js"></script>

</body>
</html>
